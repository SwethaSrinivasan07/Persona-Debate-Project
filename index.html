<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self' 'unsafe-inline';
                 style-src 'self' 'unsafe-inline';
                 connect-src 'self';
                 img-src 'self' data:;
                 font-src 'self';
                 frame-ancestors 'none';
                 base-uri 'self';
                 form-action 'self';" />
  <title>Persona Debate</title>
  <script src="config.js"></script>
  <style>
    /* ── Variables ── */
    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --primary-dark: #4f46e5;
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-2: #f1f5f9;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow: 0 4px 12px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.05);
      --shadow-lg: 0 10px 30px rgba(0,0,0,.1), 0 4px 8px rgba(0,0,0,.05);
      --radius: 12px;
      --radius-sm: 8px;

      /* Persona accent colors */
      --p1: #ef4444; /* Skeptical Engineer */
      --p2: #f59e0b; /* Budget-Conscious Buyer */
      --p3: #10b981; /* Power User */
      --p4: #3b82f6; /* First-Time User */
      --p5: #8b5cf6; /* Executive Sponsor */

      /* Status colors */
      --status-ready: #94a3b8;
      --status-loading: #3b82f6;
      --status-error: #ef4444;
      --status-success: #10b981;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    input, textarea, button { font-family: inherit; }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    .header-logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .header-text h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .header-text p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }
    .header-spacer { flex: 1; }
    #historyToggle {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #historyToggle:hover { background: var(--border); color: var(--text); }

    /* ── Layout ── */
    .app-wrapper {
      display: flex;
      height: calc(100vh - 64px);
      overflow: hidden;
    }
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1300px;
      margin: 0 auto;
      align-items: start;
    }
    @media (max-width: 900px) {
      .columns { grid-template-columns: 1fr; }
      .app-wrapper { flex-direction: column; height: auto; }
      .main-content { overflow-y: visible; }
    }

    /* ── History Sidebar ── */
    #history {
      width: 280px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      transition: width .25s ease, opacity .25s ease;
      flex-shrink: 0;
    }
    #history.collapsed {
      width: 0;
      opacity: 0;
      overflow: hidden;
    }
    .history-header {
      padding: 16px 20px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
    }
    .history-empty {
      padding: 24px 20px;
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
    }
    .history-item {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .12s;
    }
    .history-item:hover { background: var(--surface-2); }
    .history-item-idea {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-item-date {
      font-size: 11px;
      color: var(--text-muted);
    }
    #clearHistoryBtn {
      background: none;
      border: none;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      float: right;
      margin-top: -1px;
      transition: color .12s, background .12s;
    }
    #clearHistoryBtn:hover { color: var(--status-error); background: #fef2f2; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-header h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .card-header .badge {
      background: var(--surface-2);
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }
    .card-body { padding: 20px; }

    /* ── Form Elements ── */
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }
    textarea, input[type="text"] {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text);
      transition: border-color .15s, box-shadow .15s;
      resize: vertical;
    }
    textarea:focus, input[type="text"]:focus {
      outline: none;
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(99,102,241,.12);
      background: var(--surface);
    }
    textarea::placeholder, input::placeholder { color: #aab5c5; }

    #productIdea {
      min-height: 90px;
      margin-bottom: 20px;
    }

    /* ── Persona Cards ── */
    .personas-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 10px;
    }
    .personas-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }
    .persona-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      border-left-width: 4px;
      background: var(--surface-2);
      overflow: hidden;
      transition: box-shadow .15s;
    }
    .persona-card:hover { box-shadow: var(--shadow-sm); }
    .persona-card:nth-child(1) { border-left-color: var(--p1); }
    .persona-card:nth-child(2) { border-left-color: var(--p2); }
    .persona-card:nth-child(3) { border-left-color: var(--p3); }
    .persona-card:nth-child(4) { border-left-color: var(--p4); }
    .persona-card:nth-child(5) { border-left-color: var(--p5); }

    .persona-card-inner {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .persona-name-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .persona-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      font-weight: 700;
      color: white;
    }
    .persona-card:nth-child(1) .persona-icon { background: var(--p1); }
    .persona-card:nth-child(2) .persona-icon { background: var(--p2); }
    .persona-card:nth-child(3) .persona-icon { background: var(--p3); }
    .persona-card:nth-child(4) .persona-icon { background: var(--p4); }
    .persona-card:nth-child(5) .persona-icon { background: var(--p5); }

    .persona-name-input {
      flex: 1;
      background: var(--surface);
      font-weight: 600;
      font-size: 13px;
      padding: 5px 10px;
      min-height: unset;
      resize: none;
    }
    .persona-perspective {
      font-size: 13px;
      min-height: 56px;
      background: var(--surface);
    }

    /* ── Generate Button ── */
    .generate-row {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    #generateBtn {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 11px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      box-shadow: 0 2px 8px rgba(99,102,241,.3);
      letter-spacing: .1px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    #generateBtn:hover {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      box-shadow: 0 4px 14px rgba(99,102,241,.4);
      transform: translateY(-1px);
    }
    #generateBtn:active { transform: translateY(0); }

    #status {
      font-size: 13px;
      font-weight: 500;
      color: var(--status-ready);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color .2s;
    }
    #status.loading { color: var(--status-loading); }
    #status.error   { color: var(--status-error); }
    #status.success { color: var(--status-success); }
    #status.ready   { color: var(--status-ready); }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    #status.loading .status-dot {
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .4; transform: scale(.7); }
    }

    /* ── Output Section ── */
    .output-column { display: flex; flex-direction: column; gap: 16px; }

    #conversation {
      min-height: 120px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .conversation-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 13px;
      gap: 10px;
      text-align: center;
    }
    .conversation-empty .empty-icon { font-size: 32px; opacity: .4; }

    /* Conversation bubbles */
    .bubble {
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-left-width: 4px;
      background: var(--surface-2);
    }
    .bubble[data-persona="0"] { border-left-color: var(--p1); }
    .bubble[data-persona="1"] { border-left-color: var(--p2); }
    .bubble[data-persona="2"] { border-left-color: var(--p3); }
    .bubble[data-persona="3"] { border-left-color: var(--p4); }
    .bubble[data-persona="4"] { border-left-color: var(--p5); }
    .bubble-name {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 5px;
    }
    .bubble[data-persona="0"] .bubble-name { color: var(--p1); }
    .bubble[data-persona="1"] .bubble-name { color: var(--p2); }
    .bubble[data-persona="2"] .bubble-name { color: var(--p3); }
    .bubble[data-persona="3"] .bubble-name { color: var(--p4); }
    .bubble[data-persona="4"] .bubble-name { color: var(--p5); }
    .bubble-text { font-size: 13.5px; line-height: 1.6; color: var(--text); }

    /* Summary */
    #summary {
      min-height: 0;
    }
    #summary:empty { display: none; }

    /* ── Spinner ── */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      flex-shrink: 0;
      display: none;
    }
    #generateBtn.loading .spinner { display: block; }
    #generateBtn.loading .btn-icon { display: none; }
    #generateBtn:disabled {
      opacity: .7;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    /* ── Char count ── */
    .char-count {
      font-size: 11px;
      color: var(--text-muted);
      text-align: right;
      margin-top: -14px;
      margin-bottom: 20px;
      transition: color .15s;
    }
    .char-count.warn { color: var(--status-error); }

    /* ── Bubble fade-in ── */
    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .bubble {
      animation: bubbleIn .3s ease both;
    }

    /* ── Card hover depth ── */
    .card {
      transition: box-shadow .2s;
    }
    .card:hover {
      box-shadow: var(--shadow);
    }

    /* ── History 'new' badge ── */
    .history-item-new {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      background: var(--primary);
      color: white;
      padding: 1px 5px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ── Disabled form state ── */
    .form-disabled textarea,
    .form-disabled input[type="text"] {
      opacity: .55;
      pointer-events: none;
    }

    /* ── Retry button ── */
    #retryBtn {
      display: none;
      background: none;
      border: 1px solid var(--status-error);
      border-radius: var(--radius-sm);
      color: var(--status-error);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    #retryBtn:hover { background: var(--status-error); color: white; }
    #retryBtn.visible { display: inline-flex; align-items: center; gap: 4px; }

    /* ── Error details ── */
    .error-details {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }
    .error-details summary {
      cursor: pointer;
      color: var(--status-error);
      font-weight: 500;
      font-size: 11px;
      user-select: none;
    }
    .error-details pre {
      margin-top: 6px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 120px;
      overflow-y: auto;
      color: #991b1b;
    }

    /* ── Partial-result warning ── */
    .partial-warning {
      font-size: 12px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 6px;
      padding: 8px 12px;
      color: #92400e;
      margin-bottom: 12px;
    }

    /* ── Reset App button ── */
    #resetAppBtn {
      display: block;
      margin: 12px 20px;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      padding: 6px 12px;
      cursor: pointer;
      width: calc(100% - 40px);
      transition: border-color .15s, color .15s;
    }
    #resetAppBtn:hover { border-color: var(--status-error); color: var(--status-error); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-logo">💬</div>
    <div class="header-text">
      <h1>Persona Debate</h1>
      <p>Stress-test your product ideas</p>
    </div>
    <div class="header-spacer"></div>
    <button id="historyToggle">📋 History</button>
  </header>

  <div class="app-wrapper">

    <!-- Main Content -->
    <div class="main-content">
      <div class="columns">

        <!-- Left: Input -->
        <section>
          <div class="card">
            <div class="card-header">
              <h2>Your Idea</h2>
              <span class="badge">Input</span>
            </div>
            <div class="card-body">
              <label for="productIdea">Product Idea</label>
              <textarea id="productIdea" placeholder="Describe your product idea..."></textarea>
              <div class="char-count" id="charCount">0 characters</div>

              <div class="personas-label">Personas</div>
              <div class="personas-grid" id="personasGrid">

                <!-- Persona 1 -->
                <div class="persona-card">
                  <div class="persona-card-inner">
                    <div class="persona-name-row">
                      <div class="persona-icon">SE</div>
                      <input type="text" class="persona-name-input" value="Skeptical Engineer" />
                    </div>
                    <textarea class="persona-perspective" placeholder="What's this persona's perspective? (optional)"></textarea>
                  </div>
                </div>

                <!-- Persona 2 -->
                <div class="persona-card">
                  <div class="persona-card-inner">
                    <div class="persona-name-row">
                      <div class="persona-icon">BB</div>
                      <input type="text" class="persona-name-input" value="Budget-Conscious Buyer" />
                    </div>
                    <textarea class="persona-perspective" placeholder="What's this persona's perspective? (optional)"></textarea>
                  </div>
                </div>

                <!-- Persona 3 -->
                <div class="persona-card">
                  <div class="persona-card-inner">
                    <div class="persona-name-row">
                      <div class="persona-icon">PU</div>
                      <input type="text" class="persona-name-input" value="Power User" />
                    </div>
                    <textarea class="persona-perspective" placeholder="What's this persona's perspective? (optional)"></textarea>
                  </div>
                </div>

                <!-- Persona 4 -->
                <div class="persona-card">
                  <div class="persona-card-inner">
                    <div class="persona-name-row">
                      <div class="persona-icon">FU</div>
                      <input type="text" class="persona-name-input" value="First-Time User" />
                    </div>
                    <textarea class="persona-perspective" placeholder="What's this persona's perspective? (optional)"></textarea>
                  </div>
                </div>

                <!-- Persona 5 -->
                <div class="persona-card">
                  <div class="persona-card-inner">
                    <div class="persona-name-row">
                      <div class="persona-icon">ES</div>
                      <input type="text" class="persona-name-input" value="Executive Sponsor" />
                    </div>
                    <textarea class="persona-perspective" placeholder="What's this persona's perspective? (optional)"></textarea>
                  </div>
                </div>

              </div><!-- /personasGrid -->

              <div class="generate-row">
                <button id="generateBtn">
                  <span class="spinner"></span>
                  <span class="btn-icon">⚡</span>
                  <span id="btnText">Generate Debate</span>
                </button>
                <button id="retryBtn" title="Retry with current inputs">↺ Retry</button>
                <div id="status">
                  <span class="status-dot"></span>
                  <span id="statusText">Ready</span>
                </div>
              </div>
              <div id="errorDetails"></div>
            </div>
          </div>
        </section>

        <!-- Right: Output -->
        <section class="output-column">
          <div class="card">
            <div class="card-header">
              <h2>Debate</h2>
              <span class="badge">Output</span>
            </div>
            <div class="card-body">
              <div id="conversation">
                <div class="conversation-empty">
                  <div class="empty-icon">💭</div>
                  <div>The debate will appear here.<br />Fill in your idea and hit Generate.</div>
                </div>
              </div>
            </div>
          </div>

          <div class="card" id="summary"></div>
        </section>

      </div><!-- /columns -->
    </div><!-- /main-content -->

    <!-- History Sidebar -->
    <aside id="history" class="collapsed">
      <div class="history-header">
        Saved Debates
        <button id="clearHistoryBtn" title="Clear all history">✕ Clear</button>
      </div>
      <div id="historyList"></div>
      <button id="resetAppBtn" title="Clear all data and reload">⚠ Reset App</button>
    </aside>

  </div><!-- /app-wrapper -->

  <script>
    // ── Constants ──
    const PERSONA_COLORS = ['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6'];
    const STORAGE_KEY    = 'personaDebates';
    const MAX_CHARS      = 5000;

    // ── Status utility ──
    function updateStatus(message, type = 'ready') {
      const statusEl = document.getElementById('status');
      const textEl   = document.getElementById('statusText');
      statusEl.className = type;
      textEl.textContent = message;

      // Hide retry and error details unless this is an error
      const retryBtn     = document.getElementById('retryBtn');
      const errorDetails = document.getElementById('errorDetails');
      if (type !== 'error') {
        retryBtn.classList.remove('visible');
        errorDetails.innerHTML = '';
      }
    }

    // ── Error display ──
    function showError(message, details) {
      const ts = new Date().toISOString();
      console.error(`[showError] ${ts} | ${message}`, details ?? '');

      updateStatus(message, 'error');

      const retryBtn     = document.getElementById('retryBtn');
      const errorDetails = document.getElementById('errorDetails');
      retryBtn.classList.add('visible');

      if (details) {
        const detailsEl  = document.createElement('details');
        detailsEl.className = 'error-details';
        const summaryEl  = document.createElement('summary');
        summaryEl.textContent = 'Show details';
        const preEl      = document.createElement('pre');
        preEl.textContent = String(details).slice(0, 2000); // textContent escapes automatically
        detailsEl.appendChild(summaryEl);
        detailsEl.appendChild(preEl);
        errorDetails.innerHTML = '';
        errorDetails.appendChild(detailsEl);
      }
    }

    // ── Loading state ──
    function setLoading(isLoading) {
      const btn       = document.getElementById('generateBtn');
      const btnText   = document.getElementById('btnText');
      const inputCard = btn.closest('.card');
      const retryBtn  = document.getElementById('retryBtn');

      btn.disabled = isLoading;
      btn.classList.toggle('loading', isLoading);
      btnText.textContent = isLoading ? 'Generating...' : 'Generate Debate';
      inputCard.classList.toggle('form-disabled', isLoading);

      if (isLoading) {
        retryBtn.classList.remove('visible');
        document.getElementById('errorDetails').innerHTML = '';
      }
    }

    // ── Character count ──
    function updateCharCount() {
      const ta      = document.getElementById('productIdea');
      const counter = document.getElementById('charCount');
      const len     = ta.value.length;
      counter.textContent = `${len.toLocaleString()} character${len === 1 ? '' : 's'}`;
      counter.classList.toggle('warn', len > MAX_CHARS);
    }

    // ── Auto-resize textarea ──
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 320) + 'px';
    }

    // ── localStorage helpers ──
    function loadDebates() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw == null) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) {
          console.warn('[loadDebates] Unexpected data shape — starting fresh. Got:', typeof parsed);
          return [];
        }
        return parsed;
      } catch (err) {
        console.error('[loadDebates] Failed to read/parse localStorage — starting fresh:', err,
                      '| key:', STORAGE_KEY);
        return [];
      }
    }

    function saveDebate(productIdea, personas, debateData) {
      try {
        const debate = {
          id:          Date.now(),
          timestamp:   new Date().toISOString(),
          productIdea,
          personas,
          debateData,
        };

        let debates = loadDebates();
        debates.unshift(debate);

        if (debates.length > CONFIG.MAX_SAVED_RUNS) {
          debates = debates.slice(0, CONFIG.MAX_SAVED_RUNS);
        }

        localStorage.setItem(STORAGE_KEY, JSON.stringify(debates));
        console.log('[saveDebate] Saved debate id:', debate.id,
                    '| total stored:', debates.length);
        refreshHistory();
      } catch (err) {
        // Non-blocking — debate is already displayed, just warn
        console.error('[saveDebate] Failed to save to localStorage (debate still shown):', err,
                      '| idea:', productIdea);
        updateStatus('Debate generated (save to history failed — storage may be full)', 'success');
      }
    }

    // ── History sidebar ──
    function refreshHistory() {
      const list    = document.getElementById('historyList');
      const debates = loadDebates();

      list.innerHTML = '';

      if (!debates.length) {
        list.innerHTML = '<div class="history-empty">No saved debates yet.</div>';
        return;
      }

      debates.forEach((debate, i) => {
        const truncated = (debate.productIdea || '').length > 50
          ? debate.productIdea.slice(0, 50) + '…'
          : (debate.productIdea || '(untitled)');

        const date = new Date(debate.timestamp).toLocaleString(undefined, {
          month:  'short',
          day:    'numeric',
          hour:   '2-digit',
          minute: '2-digit',
        });

        const newBadge = i === 0 ? '<span class="history-item-new">new</span>' : '';

        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `
          <div class="history-item-idea">${truncated}${newBadge}</div>
          <div class="history-item-date">${date}</div>
        `;
        item.addEventListener('click', () => loadSavedDebate(debate));
        list.appendChild(item);
      });
    }

    function loadSavedDebate(debate) {
      const ideaEl = document.getElementById('productIdea');
      ideaEl.value = debate.productIdea || '';
      autoResize(ideaEl);
      updateCharCount();

      const cards = document.querySelectorAll('.persona-card');
      (debate.personas || []).forEach((p, i) => {
        if (!cards[i]) return;
        cards[i].querySelector('.persona-name-input').value  = p.name        || '';
        cards[i].querySelector('.persona-perspective').value = p.perspective || '';
      });

      displayDebate(debate.debateData);
      updateStatus('Loaded saved debate', 'success');
    }

    // ── Clear history ──
    document.getElementById('clearHistoryBtn').addEventListener('click', () => {
      if (!confirm('Clear all saved debates? This cannot be undone.')) return;
      try {
        localStorage.removeItem(STORAGE_KEY);
        console.log('[clearHistory] localStorage key removed:', STORAGE_KEY);
      } catch (err) {
        console.error('[clearHistory] Failed to remove from localStorage:', err);
      }
      refreshHistory();
      updateStatus('History cleared', 'success');
    });

    // ── Reset App ──
    document.getElementById('resetAppBtn').addEventListener('click', () => {
      if (!confirm('This will clear all saved debates and reload the app. Continue?')) return;
      try {
        localStorage.removeItem(STORAGE_KEY);
        console.log('[resetApp] Storage cleared, reloading.');
      } catch (err) {
        console.error('[resetApp] Failed to clear storage:', err);
      }
      location.reload();
    });

    // ── History toggle ──
    document.getElementById('historyToggle').addEventListener('click', () => {
      document.getElementById('history').classList.toggle('collapsed');
    });

    // ── Display debate results ──
    function displayDebate(data, { partial = false } = {}) {
      const conversation = document.getElementById('conversation');
      const summary      = document.getElementById('summary');

      const personaNames = Array.from(
        document.querySelectorAll('.persona-name-input')
      ).map(el => el.value.trim());

      conversation.innerHTML = '';

      if (partial) {
        const warn = document.createElement('div');
        warn.className = 'partial-warning';
        warn.textContent = '⚠ Partial results — the response structure was incomplete. Showing what was recovered.';
        conversation.appendChild(warn);
      }

      (data.messages || []).forEach(({ persona, message }, i) => {
        let idx = personaNames.findIndex(
          n => n.toLowerCase() === (persona || '').toLowerCase()
        );
        if (idx === -1) idx = 0;
        const color = PERSONA_COLORS[idx] || PERSONA_COLORS[0];

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.dataset.persona = idx;
        bubble.style.borderLeftColor = color;
        bubble.style.animationDelay = `${i * 60}ms`;

        const nameDiv = document.createElement('div');
        nameDiv.className = 'bubble-name';
        nameDiv.style.color = color;
        nameDiv.textContent = persona || 'Unknown'; // textContent — safe, no XSS

        const msgDiv = document.createElement('div');
        msgDiv.className = 'bubble-text';
        msgDiv.textContent = message || ''; // textContent — safe, no XSS

        bubble.appendChild(nameDiv);
        bubble.appendChild(msgDiv);
        conversation.appendChild(bubble);
      });

      summary.innerHTML = '';
      const s = data.summary || {};
      if (!s.tensions?.length && !s.objections?.length && !s.insights?.length) return;

      const sections = [
        { key: 'tensions',   label: '⚡ Key Tensions',         color: '#ef4444' },
        { key: 'objections', label: '🚧 Strongest Objections', color: '#f59e0b' },
        { key: 'insights',   label: '💡 Potential Insights',   color: '#10b981' },
      ];

      summary.innerHTML = `
        <div class="card-header">
          <h2>Synthesis</h2>
          <span class="badge">Summary</span>
        </div>
        <div class="card-body" id="summaryBody"></div>
      `;
      const body = summary.querySelector('#summaryBody');

      sections.forEach(({ key, label, color }) => {
        const items = s[key];
        if (!items?.length) return;

        const block = document.createElement('div');
        block.style.cssText = 'margin-bottom:16px';

        // Label — uses hardcoded string, safe
        const labelDiv = document.createElement('div');
        labelDiv.style.cssText = `font-size:12px;font-weight:700;text-transform:uppercase;
                                   letter-spacing:.5px;color:${color};margin-bottom:8px`;
        labelDiv.textContent = label;

        const ul = document.createElement('ul');
        ul.style.cssText = 'list-style:none;display:flex;flex-direction:column;gap:6px';

        items.forEach(item => {
          const li = document.createElement('li');
          li.style.cssText = `font-size:13.5px;line-height:1.5;padding:8px 12px;
                               background:var(--surface-2);border-radius:6px;
                               border-left:3px solid ${color}`;
          li.textContent = String(item); // textContent — safe, no XSS
          ul.appendChild(li);
        });

        block.appendChild(labelDiv);
        block.appendChild(ul);
        body.appendChild(block);
      });
    }

    // ── Input sanitization ──
    function sanitizeIdea(raw) {
      return raw.trim().slice(0, MAX_CHARS);
    }

    // ── Response validation & recovery ──
    function validateAndNormalize(parsed, rawText) {
      const hasMessages = Array.isArray(parsed?.messages) && parsed.messages.length > 0;
      const hasSummary  = parsed?.summary && typeof parsed.summary === 'object';

      if (hasMessages && hasSummary) {
        return { data: parsed, partial: false };
      }

      // Attempt partial recovery
      const recovered = {
        messages: hasMessages ? parsed.messages : [],
        summary:  hasSummary  ? parsed.summary  : { tensions: [], objections: [], insights: [] },
      };

      if (!hasMessages && !hasSummary) {
        return { data: null, partial: false }; // unrecoverable
      }

      console.warn('[validateAndNormalize] Partial response recovered:', recovered,
                   '| raw text length:', rawText.length);
      return { data: recovered, partial: true };
    }

    // ── Core generate function ──
    async function generateDebate() {
      const rawIdea = document.getElementById('productIdea').value;
      const productIdea = sanitizeIdea(rawIdea);

      const personaCards = document.querySelectorAll('.persona-card');
      const personas = Array.from(personaCards).map(card => ({
        name:        card.querySelector('.persona-name-input').value.trim(),
        perspective: card.querySelector('.persona-perspective').value.trim(),
      }));

      // ── Validation ──
      if (!productIdea) {
        updateStatus('Please describe your product idea first.', 'error');
        document.getElementById('productIdea').focus();
        return;
      }
      if (productIdea.length >= MAX_CHARS) {
        updateStatus(`Product idea exceeds ${MAX_CHARS.toLocaleString()} characters — please shorten it.`, 'error');
        return;
      }
      const missingName = personas.find(p => !p.name);
      if (missingName) {
        updateStatus('All persona names must be filled in.', 'error');
        return;
      }

      setLoading(true);
      updateStatus('Generating debate...', 'loading');

      const personaDescriptions = personas
        .map(p => `- ${p.name}${p.perspective ? `: ${p.perspective}` : ''}`)
        .join('\n');

      const prompt = `You are simulating a realistic product debate between 5 personas evaluating a new product idea.

Product idea: "${productIdea}"

Personas:
${personaDescriptions}

Generate a realistic debate of 8–10 messages among these personas. Each message should:
- Clearly reflect the persona's unique viewpoint and role
- Include genuine disagreements, pushback, and contrasting perspectives
- Build on or respond to previous points where natural
- Feel authentic, not polished or corporate

Then provide a synthesis capturing the key tensions, the strongest objections raised, and the most valuable insights surfaced.

Return ONLY valid JSON in exactly this structure (no markdown, no extra text):
{
  "messages": [
    { "persona": "<persona name>", "message": "<their statement>" }
  ],
  "summary": {
    "tensions": ["<tension 1>", "<tension 2>"],
    "objections": ["<objection 1>", "<objection 2>"],
    "insights": ["<insight 1>", "<insight 2>"]
  }
}`;

      console.log('[generateDebate] Sending request to: /api/debate');
      console.log('[generateDebate] Model:', CONFIG.OPENAI_MODEL);
      console.log('[generateDebate] Product idea:', productIdea);
      console.log('[generateDebate] Personas:', personas);

      try {
        let response;
        try {
          response = await fetch('/api/debate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model:        CONFIG.OPENAI_MODEL,
              input:        prompt,
              instructions: 'Return only valid JSON. No markdown fences, no extra commentary.',
            }),
          });
        } catch (networkErr) {
          showError('Network error — check your internet connection.', networkErr.message);
          return;
        }

        console.log('[generateDebate] Response status:', response.status, response.statusText);

        if (!response.ok) {
          const errorBody = await response.text();
          console.error('[generateDebate] HTTP error body:', errorBody);

          let userMsg;
          if (response.status === 401) {
            userMsg = 'Invalid API key — check the OPENAI_API_KEY environment variable on your server.';
          } else if (response.status === 429) {
            userMsg = 'Rate limited — wait a minute and try again.';
          } else if (response.status >= 500) {
            userMsg = 'OpenAI service error — try again in a few minutes.';
          } else {
            try {
              const errJson = JSON.parse(errorBody);
              userMsg = errJson?.error?.message ?? `API error ${response.status}`;
            } catch (_) {
              userMsg = `API error ${response.status}`;
            }
          }
          showError(userMsg, `HTTP ${response.status}: ${errorBody.slice(0, 500)}`);
          return;
        }

        const raw = await response.json();
        console.log('[generateDebate] Raw API response:', raw);

        let text = raw?.output?.[0]?.content?.[0]?.text ?? '';
        if (!text) text = raw?.choices?.[0]?.message?.content ?? '';
        console.log('[generateDebate] Extracted text:', text);

        // Strip markdown fences
        text = text.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/i, '').trim();

        let parsed;
        try {
          parsed = JSON.parse(text);
        } catch (parseErr) {
          console.error('[generateDebate] JSON parse failed:', parseErr,
                        '| raw text:', text.slice(0, 300));
          showError('Unexpected response format — could not parse JSON.', text.slice(0, 800));
          return;
        }

        console.log('[generateDebate] Parsed debate data:', parsed);

        const { data, partial } = validateAndNormalize(parsed, text);

        if (!data) {
          showError('Unexpected response format — no usable content found.', text.slice(0, 800));
          return;
        }

        displayDebate(data, { partial });
        saveDebate(productIdea, personas, data);
        updateStatus(partial ? 'Partial results shown — see warning above.' : 'Debate generated!', 'success');

      } catch (err) {
        console.error('[generateDebate] Unexpected error:', err,
                      '| endpoint: /api/debate',
                      '| model:', CONFIG.OPENAI_MODEL,
                      '| idea length:', productIdea.length);
        showError('Something went wrong — check the console for details.', err.message);
      } finally {
        setLoading(false);
      }
    }

    // ── Generate + Retry buttons ──
    document.getElementById('generateBtn').addEventListener('click', generateDebate);
    document.getElementById('retryBtn').addEventListener('click', generateDebate);

    // ── Keyboard shortcut: Cmd/Ctrl+Enter ──
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        const active = document.activeElement;
        const isFormField = active && (
          active.tagName === 'TEXTAREA' || active.tagName === 'INPUT'
        );
        if (isFormField) {
          e.preventDefault();
          generateDebate();
        }
      }
    });

    // ── Init ──
    document.addEventListener('DOMContentLoaded', () => {
      refreshHistory();

      const productIdea = document.getElementById('productIdea');
      productIdea.addEventListener('input', () => {
        updateCharCount();
        autoResize(productIdea);
      });
      updateCharCount();
    });

    updateStatus('Ready', 'ready');
  </script>
</body>
</html>
